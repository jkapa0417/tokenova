# Branch-level CI: run the shared check suite on every push to main and
# every PR targeting main. The actual check steps live in _checks.yml so
# release.yml can gate artifact builds on the exact same suite without
# duplicating step definitions.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Re-pushing main (force-push or quick succession) cancels the in-progress
# CI run for the same ref — only the latest commit's checks finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml
