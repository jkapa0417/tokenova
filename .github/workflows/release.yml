name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            fonts-noto-cjk \
            libnotify-bin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. Without these, the updater
          # plugin's signature verification rejects every release and clients
          # silently stay on the old version.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tokenova ${{ github.ref_name }}"
          releaseBody: |
            See the assets to download a build for your platform.

            ## Installers
            - Windows: `.msi` (x64)
            - macOS: `.dmg` (universal)
            - Linux: `.AppImage` / `.deb`

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for changelog and notes.
          # Draft = false so `releases/latest/download/latest.json` resolves —
          # GitHub's "latest" alias only points at published, non-draft releases.
          releaseDraft: false
          prerelease: false
          # Generates and uploads `latest.json` alongside the platform installers.
          # The endpoint in tauri.conf.json points at this file.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
